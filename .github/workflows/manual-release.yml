name: Manual Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next version tag
        id: version
        shell: bash
        run: |
          latest_tag="$(
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' |
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
            sort -V |
            tail -n 1 ||
            true
          )"

          if [[ -z "${latest_tag}" ]]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          if git rev-parse --verify --quiet "refs/tags/${next_tag}" >/dev/null; then
            echo "Tag ${next_tag} already exists." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${next_tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${next_tag}"

          echo "tag=${next_tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            artifact_name: vlc-cors-proxy-linux
            asset_name: vlc-cors-proxy-linux
            binary_path: dist/vlc-cors-proxy
          - platform: macos
            os: macos-latest
            artifact_name: vlc-cors-proxy-macos
            asset_name: vlc-cors-proxy-macos
            binary_path: dist/vlc-cors-proxy
          - platform: windows
            os: windows-latest
            artifact_name: vlc-cors-proxy-windows
            asset_name: vlc-cors-proxy-windows.exe
            binary_path: dist/vlc-cors-proxy.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run tests
        run: python -m unittest

      - name: Smoke check script startup
        run: python vlc_cors_proxy.py --help

      - name: Build executable
        run: pyinstaller --onefile --name vlc-cors-proxy vlc_cors_proxy.py

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact
          Copy-Item -LiteralPath "${{ matrix.binary_path }}" -Destination "artifact/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create release
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vlc-cors-proxy-*
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          files: release-artifacts/*
